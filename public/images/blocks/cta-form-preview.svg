<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <rect width="400" height="250" fill="#1F2325" rx="8"/>

  <!-- Heading -->
  <rect x="100" y="20" width="200" height="14" rx="3" fill="#FFFFFF" opacity="0.85"/>
  <!-- Subtext -->
  <rect x="120" y="42" width="160" height="8" rx="2" fill="#FFFFFF" opacity="0.3"/>

  <!-- Form container -->
  <rect x="60" y="65" width="280" height="155" rx="8" fill="#FFFFFF" opacity="0.04"/>

  <!-- Name row (two fields) -->
  <rect x="80" y="80" width="50" height="6" rx="2" fill="#FFFFFF" opacity="0.35"/>
  <rect x="80" y="92" width="115" height="28" rx="4" fill="#FFFFFF" opacity="0.08" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.15"/>
  <rect x="92" y="103" width="60" height="6" rx="2" fill="#FFFFFF" opacity="0.15"/>

  <rect x="205" y="80" width="50" height="6" rx="2" fill="#FFFFFF" opacity="0.35"/>
  <rect x="205" y="92" width="115" height="28" rx="4" fill="#FFFFFF" opacity="0.08" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.15"/>
  <rect x="217" y="103" width="60" height="6" rx="2" fill="#FFFFFF" opacity="0.15"/>

  <!-- Email field -->
  <rect x="80" y="130" width="40" height="6" rx="2" fill="#FFFFFF" opacity="0.35"/>
  <rect x="80" y="142" width="240" height="28" rx="4" fill="#FFFFFF" opacity="0.08" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.15"/>
  <rect x="92" y="153" width="80" height="6" rx="2" fill="#FFFFFF" opacity="0.15"/>

  <!-- Submit button -->
  <rect x="140" y="185" width="120" height="32" rx="6" fill="#34A3D3"/>
  <rect x="168" y="198" width="64" height="7" rx="2" fill="#FFFFFF" opacity="0.9"/>

  <!-- Label -->
  <text x="200" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.35">CTA Form</text>
</svg>