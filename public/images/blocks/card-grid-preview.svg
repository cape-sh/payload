<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <rect width="400" height="250" fill="#1F2325" rx="8"/>

  <!-- Section heading -->
  <rect x="130" y="18" width="140" height="12" rx="3" fill="#FFFFFF" opacity="0.8"/>

  <!-- Card 1 -->
  <rect x="20" y="48" width="170" height="160" rx="8" fill="#FFFFFF" opacity="0.05" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.08"/>
  <!-- Icon -->
  <rect x="40" y="65" width="36" height="36" rx="8" fill="#34A3D3" opacity="0.25"/>
  <circle cx="58" cy="83" r="10" fill="#34A3D3" opacity="0.6"/>
  <!-- Title -->
  <rect x="40" y="114" width="100" height="10" rx="2" fill="#FFFFFF" opacity="0.7"/>
  <!-- Description -->
  <rect x="40" y="134" width="130" height="6" rx="2" fill="#FFFFFF" opacity="0.2"/>
  <rect x="40" y="146" width="110" height="6" rx="2" fill="#FFFFFF" opacity="0.2"/>
  <rect x="40" y="158" width="90" height="6" rx="2" fill="#FFFFFF" opacity="0.2"/>
  <!-- Link -->
  <rect x="40" y="178" width="60" height="6" rx="2" fill="#34A3D3" opacity="0.6"/>

  <!-- Card 2 -->
  <rect x="210" y="48" width="170" height="160" rx="8" fill="#FFFFFF" opacity="0.05" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.08"/>
  <!-- Icon -->
  <rect x="230" y="65" width="36" height="36" rx="8" fill="#34A3D3" opacity="0.25"/>
  <circle cx="248" cy="83" r="10" fill="#34A3D3" opacity="0.6"/>
  <!-- Title -->
  <rect x="230" y="114" width="110" height="10" rx="2" fill="#FFFFFF" opacity="0.7"/>
  <!-- Description -->
  <rect x="230" y="134" width="130" height="6" rx="2" fill="#FFFFFF" opacity="0.2"/>
  <rect x="230" y="146" width="100" height="6" rx="2" fill="#FFFFFF" opacity="0.2"/>
  <rect x="230" y="158" width="120" height="6" rx="2" fill="#FFFFFF" opacity="0.2"/>
  <!-- Link -->
  <rect x="230" y="178" width="60" height="6" rx="2" fill="#34A3D3" opacity="0.6"/>

  <!-- Hint of third card (clipped) -->
  <rect x="395" y="48" width="170" height="160" rx="8" fill="#FFFFFF" opacity="0.03"/>

  <!-- Label -->
  <text x="200" y="238" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.35">Card Grid</text>
</svg>